# Default values — overridden by values-dev.yaml / values-stage.yaml / values-prod.yaml

replicaCount: 1

image:
  repository: docker.aa.com/nonprod/fxip/fxip-data-lineage-tool
  pullPolicy: IfNotPresent
  tag: "latest"

imagePullSecrets:
  - name: docker-registry-secret

nameOverride: ""
fullnameOverride: "fxip-data-lineage-tool"

serviceAccount:
  create: false
  name: ""

podAnnotations:
  prometheus.io/scrape: "false"

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 101  # nginx user
  fsGroup: 101

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

ingress:
  enabled: true
  className: "nginx"
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
  hosts:
    - host: fxip-lineage.internal.aa.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: fxip-lineage-tls
      hosts:
        - fxip-lineage.internal.aa.com

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80

nodeSelector: {}
tolerations: []
affinity: {}

livenessProbe:
  httpGet:
    path: /health
    port: 8080
  initialDelaySeconds: 10
  periodSeconds: 30

readinessProbe:
  httpGet:
    path: /health
    port: 8080
  initialDelaySeconds: 5
  periodSeconds: 10
