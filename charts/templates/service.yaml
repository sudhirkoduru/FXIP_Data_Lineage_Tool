apiVersion: v1
kind: Service
metadata:
  name: {{ include "fxip-data-lineage-tool.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "fxip-data-lineage-tool.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 8080
      protocol: TCP
      name: http
  selector:
    {{- include "fxip-data-lineage-tool.selectorLabels" . | nindent 4 }}
