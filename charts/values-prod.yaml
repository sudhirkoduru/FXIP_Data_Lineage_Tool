replicaCount: 2

image:
  repository: docker.aa.com/nonprod/fxip/fxip-data-lineage-tool
  tag: "1.0.0"
  pullPolicy: IfNotPresent

ingress:
  enabled: true
  hosts:
    - host: fxip-lineage.internal.aa.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: fxip-lineage-tls
      hosts:
        - fxip-lineage.internal.aa.com

resources:
  requests:
    cpu: 100m
    memory: 64Mi
  limits:
    cpu: 300m
    memory: 256Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 4
  targetCPUUtilizationPercentage: 70
